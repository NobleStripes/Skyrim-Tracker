<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrim Tracker Tests</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111318;
            --panel: #1a2028;
            --border: #70573a;
            --text: #ede2cf;
            --muted: #b7aa94;
            --pass: #4da46a;
            --fail: #c05a4f;
            --accent: #d3b17c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 2rem;
            font-family: Georgia, serif;
            background: radial-gradient(circle at top, #20242c, var(--bg) 58%);
            color: var(--text);
        }

        main {
            max-width: 64rem;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: var(--accent);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        p {
            color: var(--muted);
        }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        button {
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            padding: 0.7rem 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        button:hover {
            background: rgba(211, 177, 124, 0.12);
        }

        .summary {
            padding: 1rem 1.2rem;
            background: var(--panel);
            border: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .summary.pass {
            border-left: 4px solid var(--pass);
        }

        .summary.fail {
            border-left: 4px solid var(--fail);
        }

        .results {
            display: grid;
            gap: 0.85rem;
        }

        .result {
            background: var(--panel);
            border: 1px solid rgba(112, 87, 58, 0.45);
            padding: 1rem 1.2rem;
        }

        .result.pass {
            border-left: 4px solid var(--pass);
        }

        .result.fail {
            border-left: 4px solid var(--fail);
        }

        .result h2 {
            margin: 0 0 0.35rem;
            font-size: 1rem;
        }

        .result pre {
            margin-top: 0.75rem;
            padding: 0.85rem;
            background: rgba(0, 0, 0, 0.22);
            overflow-x: auto;
            color: #f3ebe0;
        }
    </style>
</head>
<body>
    <main>
        <h1>Skyrim Tracker Tests</h1>
        <p>This page exercises the shared import parsing, backup handling, filtering, sorting, journal management, and journal-details rendering helpers used by the app.</p>
        <div class="toolbar">
            <button type="button" id="rerun-tests">Run Tests Again</button>
            <span id="timestamp"></span>
        </div>
        <section id="summary" class="summary"></section>
        <section id="results" class="results"></section>
    </main>

    <script src="quest-data.js"></script>
    <script>
        const summaryEl = document.getElementById('summary');
        const resultsEl = document.getElementById('results');
        const timestampEl = document.getElementById('timestamp');
        const rerunButton = document.getElementById('rerun-tests');

        function assert(condition, message) {
            if (!condition) {
                throw new Error(message);
            }
        }

        function formatError(error) {
            return error && error.stack ? error.stack : String(error);
        }

        function runTests() {
            const helper = window.SkyrimQuestData;
            const tests = [
                {
                    name: 'normalizeQuest trims and defaults fields',
                    run() {
                        const quest = helper.normalizeQuest({
                            title: '  Test Quest  ',
                            category: 'Invalid',
                            status: 'Broken',
                            location: '  Whiterun  ',
                            notes: '  Journal entry  ',
                            prerequisites: ['  Before the Storm  ', '', null],
                            branchGroup: '  Civil War  ',
                            branch: '  Imperial  '
                        });

                        assert(quest.title === 'Test Quest', 'Expected title to be trimmed.');
                        assert(quest.category === 'Miscellaneous', 'Expected invalid category to default to Miscellaneous.');
                        assert(quest.status === 'Not Started', 'Expected invalid status to default to Not Started.');
                        assert(quest.location === 'Whiterun', 'Expected location to be trimmed.');
                        assert(quest.notes === 'Journal entry', 'Expected notes to be trimmed.');
                        assert(quest.prerequisites.length === 1 && quest.prerequisites[0] === 'Before the Storm', 'Expected prerequisites to be normalized.');
                        assert(quest.branchGroup === 'Civil War', 'Expected branchGroup to be trimmed.');
                        assert(quest.branch === 'Imperial', 'Expected branch to be trimmed.');
                    }
                },
                {
                    name: 'parseQuestCollection accepts export payloads',
                    run() {
                        const quests = helper.parseQuestCollection({
                            journalName: 'Nord Hero',
                            quests: [
                                { title: 'Unbound', category: 'Main Quest', status: 'Completed' },
                                { title: 'Dragon Rising', category: 'Main Quest', status: 'Active' }
                            ]
                        });

                        assert(Array.isArray(quests), 'Expected an array of quests.');
                        assert(quests.length === 2, 'Expected two parsed quests.');
                        assert(quests[1].status === 'Active', 'Expected explicit status to survive parsing.');
                    }
                },
                {
                    name: 'parseQuestCollection rejects invalid payloads',
                    run() {
                        let threw = false;

                        try {
                            helper.parseQuestCollection({ invalid: true });
                        } catch (error) {
                            threw = /quests array/i.test(String(error.message));
                        }

                        assert(threw, 'Expected invalid payloads to throw a quests-array error.');
                    }
                },
                {
                    name: 'normalizeJournal preserves names and nested quests',
                    run() {
                        const journal = helper.normalizeJournal({
                            name: '  Mage Run  ',
                            quests: [
                                { title: 'Visit the College of Winterhold', category: 'Miscellaneous', status: 'Active' }
                            ]
                        }, 'Fallback');

                        assert(journal.name === 'Mage Run', 'Expected journal name to be trimmed.');
                        assert(journal.quests.length === 1, 'Expected normalized nested quests.');
                        assert(journal.quests[0].title === 'Visit the College of Winterhold', 'Expected quest title to persist.');
                        assert(typeof journal.updatedAt === 'string', 'Expected journals to carry updatedAt metadata.');
                    }
                },
                {
                    name: 'createDefaultJournal creates a named journal wrapper',
                    run() {
                        const journal = helper.createDefaultJournal([
                            { title: 'A Night to Remember', category: 'Side Quest', status: 'Not Started' }
                        ], 'Bard Run');

                        assert(journal.name === 'Bard Run', 'Expected the provided journal name.');
                        assert(journal.quests.length === 1, 'Expected quests to be wrapped into the journal.');
                        assert(journal.id.startsWith('journal-'), 'Expected journal ids to carry a journal prefix.');
                    }
                },
                {
                    name: 'parseJournalStore rejects malformed stores',
                    run() {
                        let threw = false;

                        try {
                            helper.parseJournalStore({ journals: [] });
                        } catch (error) {
                            threw = /at least one journal/i.test(String(error.message));
                        }

                        assert(threw, 'Expected an empty journal store to throw.');
                    }
                },
                {
                    name: 'parseJournalStore keeps valid journal metadata',
                    run() {
                        const journals = helper.parseJournalStore({
                            journals: [
                                {
                                    id: 'journal-one',
                                    name: 'Warrior',
                                    createdAt: '2026-01-10T08:00:00.000Z',
                                    updatedAt: '2026-01-15T09:30:00.000Z',
                                    quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }]
                                }
                            ]
                        });

                        assert(journals.length === 1, 'Expected one parsed journal.');
                        assert(journals[0].createdAt === '2026-01-10T08:00:00.000Z', 'Expected createdAt metadata to persist.');
                        assert(journals[0].updatedAt === '2026-01-15T09:30:00.000Z', 'Expected updatedAt metadata to persist.');
                    }
                },
                {
                    name: 'migrateLegacyQuestStore wraps legacy quests into a journal',
                    run() {
                        const migrated = helper.migrateLegacyQuestStore([
                            { title: 'Bleak Falls Barrow', category: 'Main Quest', status: 'Active' }
                        ], 'Nord Save');

                        assert(migrated.name === 'Nord Save', 'Expected legacy migration to use the provided default name.');
                        assert(migrated.quests.length === 1, 'Expected legacy quest array to migrate into a journal.');
                        assert(migrated.quests[0].title === 'Bleak Falls Barrow', 'Expected migrated quest content to be preserved.');
                    }
                },
                {
                    name: 'backfillJournalStoreWithStarterQuests adds only missing Main and Daedric starters',
                    run() {
                        const backfilled = helper.backfillJournalStoreWithStarterQuests([
                            {
                                id: 'journal-one',
                                name: 'Warrior',
                                quests: [
                                    { id: 'existing-main', title: 'Unbound', category: 'Main Quest', status: 'Completed', notes: 'Keep this progress.' },
                                    { id: 'existing-side', title: 'Lights Out!', category: 'Side Quest', status: 'Active' }
                                ]
                            }
                        ], [
                            { id: 'starter-main', title: 'Unbound', category: 'Main Quest', status: 'Not Started', notes: 'Starter copy should not overwrite.' },
                            { id: 'starter-daedric', title: 'The Black Star', category: 'Daedric', status: 'Not Started' },
                            { id: 'starter-side', title: 'Blood on the Ice', category: 'Side Quest', status: 'Not Started' }
                        ]);

                        const journal = backfilled.journals[0];
                        const titles = journal.quests.map(quest => quest.title);
                        const existingMainQuest = journal.quests.find(quest => quest.title === 'Unbound' && quest.category === 'Main Quest');

                        assert(backfilled.addedCount === 1, 'Expected only one missing starter quest to be added.');
                        assert(titles.includes('The Black Star'), 'Expected the missing Daedric starter quest to be appended.');
                        assert(!titles.includes('Blood on the Ice'), 'Expected non-Main and non-Daedric starter quests to be ignored by backfill.');
                        assert(existingMainQuest.id === 'existing-main', 'Expected existing matching quests to keep their original id.');
                        assert(existingMainQuest.status === 'Completed', 'Expected existing matching quests to preserve their current status.');
                        assert(existingMainQuest.notes === 'Keep this progress.', 'Expected existing matching quests to preserve their notes.');
                    }
                },
                {
                    name: 'createImportedJournal uses export metadata when available',
                    run() {
                        const imported = helper.createImportedJournal({
                            journalName: 'Imperial Run',
                            createdAt: '2026-03-01T10:00:00.000Z',
                            updatedAt: '2026-03-02T11:00:00.000Z',
                            quests: [
                                { title: 'Joining the Legion', category: 'Faction', status: 'Active' }
                            ]
                        }, 'Fallback');

                        assert(imported.name === 'Imperial Run', 'Expected import helper to prefer exported journal names.');
                        assert(imported.createdAt === '2026-03-01T10:00:00.000Z', 'Expected import helper to preserve createdAt.');
                        assert(imported.updatedAt === '2026-03-02T11:00:00.000Z', 'Expected import helper to preserve updatedAt.');
                    }
                },
                {
                    name: 'buildJournalExport includes metadata and quest count',
                    run() {
                        const exported = helper.buildJournalExport({
                            id: 'journal-one',
                            name: 'Companion Run',
                            createdAt: '2026-02-01T12:00:00.000Z',
                            updatedAt: '2026-02-05T12:00:00.000Z',
                            quests: [
                                { title: 'Take Up Arms', category: 'Faction', status: 'Completed' },
                                { title: 'Proving Honor', category: 'Faction', status: 'Active' }
                            ]
                        }, '2026-04-23T08:15:00.000Z');

                        assert(exported.journalName === 'Companion Run', 'Expected exported payload to carry the journal name.');
                        assert(exported.questCount === 2, 'Expected exported payload to include questCount.');
                        assert(exported.createdAt === '2026-02-01T12:00:00.000Z', 'Expected exported payload to preserve createdAt.');
                        assert(exported.updatedAt === '2026-02-05T12:00:00.000Z', 'Expected exported payload to preserve updatedAt.');
                    }
                },
                {
                    name: 'buildJournalStoreExport includes all journals and active journal id',
                    run() {
                        const backup = helper.buildJournalStoreExport([
                            { id: 'journal-one', name: 'Warrior', quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }] },
                            { id: 'journal-two', name: 'Mage', quests: [{ title: 'First Lessons', category: 'Faction', status: 'Active' }] }
                        ], 'journal-two', '2026-04-23T08:30:00.000Z');

                        assert(backup.format === helper.BACKUP_FORMAT, 'Expected backup format marker.');
                        assert(backup.version === helper.BACKUP_VERSION, 'Expected backup version marker.');
                        assert(backup.journalCount === 2, 'Expected backup journal count.');
                        assert(backup.activeJournalId === 'journal-two', 'Expected active journal id to be preserved in backup.');
                        assert(backup.exportedAt === '2026-04-23T08:30:00.000Z', 'Expected backup export timestamp to be preserved.');
                    }
                },
                {
                    name: 'migrateJournalBackup upgrades unversioned backups',
                    run() {
                        const migrated = helper.migrateJournalBackup({
                            exportedAt: '2026-04-23T08:30:00.000Z',
                            activeJournalId: 'journal-two',
                            journals: [
                                { id: 'journal-one', name: 'Warrior', quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }] },
                                { id: 'journal-two', name: 'Mage', quests: [{ title: 'First Lessons', category: 'Faction', status: 'Active' }] }
                            ]
                        });

                        assert(migrated.format === helper.BACKUP_FORMAT, 'Expected migrated backups to gain the format marker.');
                        assert(migrated.version === 1, 'Expected unversioned backups to be treated as legacy version 1.');
                    }
                },
                {
                    name: 'parseJournalBackup normalizes journals and active selection',
                    run() {
                        const parsedBackup = helper.parseJournalBackup({
                            exportedAt: '2026-04-23T08:30:00.000Z',
                            activeJournalId: 'journal-two',
                            journals: [
                                { id: 'journal-one', name: 'Warrior', quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }] },
                                { id: 'journal-two', name: 'Mage', quests: [{ title: 'First Lessons', category: 'Faction', status: 'Active' }] }
                            ]
                        });

                        assert(parsedBackup.journals.length === 2, 'Expected all journals to be parsed from backup.');
                        assert(parsedBackup.version === helper.BACKUP_VERSION, 'Expected parsed backups to return the current backup version.');
                        assert(parsedBackup.activeJournalId === 'journal-two', 'Expected backup parser to preserve active journal selection.');
                        assert(parsedBackup.journals[1].name === 'Mage', 'Expected backup parser to preserve journal data.');
                    }
                },
                {
                    name: 'parseJournalBackup rejects unsupported future versions',
                    run() {
                        let threw = false;

                        try {
                            helper.parseJournalBackup({
                                format: helper.BACKUP_FORMAT,
                                version: helper.BACKUP_VERSION + 1,
                                journals: [
                                    { id: 'journal-one', name: 'Warrior', quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }] }
                                ]
                            });
                        } catch (error) {
                            threw = /newer than this app supports/i.test(String(error.message));
                        }

                        assert(threw, 'Expected unsupported future backup versions to throw.');
                    }
                },
                {
                    name: 'getVisibleQuests filters by category, status, and search terms',
                    run() {
                        const quests = [
                            helper.normalizeQuest({ title: 'Dragon Rising', category: 'Main Quest', status: 'Active', notes: 'Meet the Jarl' }),
                            helper.normalizeQuest({ title: 'Take Up Arms', category: 'Faction', status: 'Not Started', notes: 'Join the Companions' }),
                            helper.normalizeQuest({ title: 'The Black Star', category: 'Daedric', status: 'Completed', branchGroup: 'Azura Artifact Choice' })
                        ];

                        const filtered = helper.getVisibleQuests(quests, {
                            category: 'Daedric',
                            status: 'Completed',
                            search: 'azura',
                            sort: 'recent'
                        });

                        assert(filtered.length === 1, 'Expected one visible quest after combined filtering.');
                        assert(filtered[0].title === 'The Black Star', 'Expected the matching Daedric quest to remain visible.');
                    }
                },
                {
                    name: 'getVisibleQuests sorts by status order then title',
                    run() {
                        const quests = [
                            helper.normalizeQuest({ title: 'The Way of the Voice', category: 'Main Quest', status: 'Not Started' }),
                            helper.normalizeQuest({ title: 'Bleak Falls Barrow', category: 'Main Quest', status: 'Active' }),
                            helper.normalizeQuest({ title: 'A Blade in the Dark', category: 'Main Quest', status: 'Active' }),
                            helper.normalizeQuest({ title: 'Dragon Rising', category: 'Main Quest', status: 'Completed' })
                        ];

                        const sorted = helper.getVisibleQuests(quests, { sort: 'status' });
                        const titles = sorted.map(quest => quest.title);

                        assert(titles[0] === 'A Blade in the Dark', 'Expected active quests to sort first and alphabetically.');
                        assert(titles[1] === 'Bleak Falls Barrow', 'Expected second active quest to follow alphabetically.');
                        assert(titles[3] === 'Dragon Rising', 'Expected completed quests to sort last.');
                    }
                },
                {
                    name: 'selectJournal returns requested journal or falls back to the first',
                    run() {
                        const journals = [
                            helper.normalizeJournal({ id: 'journal-one', name: 'Warrior', quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }] }, 'Warrior'),
                            helper.normalizeJournal({ id: 'journal-two', name: 'Mage', quests: [{ title: 'First Lessons', category: 'Faction', status: 'Active' }] }, 'Mage')
                        ];

                        const selected = helper.selectJournal(journals, 'journal-two');
                        const fallback = helper.selectJournal(journals, 'missing');

                        assert(selected.name === 'Mage', 'Expected explicit journal selection to succeed.');
                        assert(fallback.name === 'Warrior', 'Expected missing selection to fall back to the first journal.');
                    }
                },
                {
                    name: 'duplicateJournal clones quests and gives them new ids',
                    run() {
                        const original = helper.normalizeJournal({
                            id: 'journal-original',
                            name: 'Stealth Run',
                            createdAt: '2026-04-01T08:00:00.000Z',
                            updatedAt: '2026-04-02T08:00:00.000Z',
                            quests: [
                                { id: 'quest-1', title: 'Loud and Clear', category: 'Faction', status: 'Active', prerequisites: ['Taking Care of Business'] }
                            ]
                        }, 'Stealth Run');

                        const duplicate = helper.duplicateJournal(original, 'Stealth Run Copy');

                        assert(duplicate.name === 'Stealth Run Copy', 'Expected duplicate journal name to use the provided override.');
                        assert(duplicate.id !== original.id, 'Expected duplicated journal to receive a new id.');
                        assert(duplicate.quests[0].id !== original.quests[0].id, 'Expected duplicated quests to receive new ids.');
                        assert(duplicate.quests[0].title === original.quests[0].title, 'Expected duplicated quest content to be preserved.');
                        assert(duplicate.updatedAt !== original.updatedAt, 'Expected duplicated journal metadata to get a fresh timestamp.');
                    }
                },
                {
                    name: 'deleteJournal removes one journal but preserves the rest',
                    run() {
                        const journals = [
                            helper.normalizeJournal({ id: 'journal-one', name: 'Warrior', quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }] }, 'Warrior'),
                            helper.normalizeJournal({ id: 'journal-two', name: 'Mage', quests: [{ title: 'First Lessons', category: 'Faction', status: 'Active' }] }, 'Mage')
                        ];

                        const remaining = helper.deleteJournal(journals, 'journal-one');
                        assert(remaining.length === 1, 'Expected one journal to remain after deletion.');
                        assert(remaining[0].name === 'Mage', 'Expected the non-deleted journal to remain.');
                    }
                },
                {
                    name: 'deleteJournal rejects removing the final journal',
                    run() {
                        let threw = false;

                        try {
                            helper.deleteJournal([
                                helper.normalizeJournal({ id: 'journal-one', name: 'Solo', quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }] }, 'Solo')
                            ], 'journal-one');
                        } catch (error) {
                            threw = /at least one journal/i.test(String(error.message));
                        }

                        assert(threw, 'Expected deleting the final journal to throw.');
                    }
                },
                {
                    name: 'touchJournal updates only the updatedAt timestamp',
                    run() {
                        const touched = helper.touchJournal({
                            id: 'journal-one',
                            name: 'Mage Run',
                            createdAt: '2026-04-10T08:00:00.000Z',
                            updatedAt: '2026-04-11T08:00:00.000Z',
                            quests: [{ title: 'First Lessons', category: 'Faction', status: 'Active' }]
                        }, '2026-04-12T08:00:00.000Z');

                        assert(touched.createdAt === '2026-04-10T08:00:00.000Z', 'Expected createdAt to remain unchanged when touching a journal.');
                        assert(touched.updatedAt === '2026-04-12T08:00:00.000Z', 'Expected touchJournal to replace updatedAt.');
                    }
                },
                {
                    name: 'summarizeJournal returns quest counts and timestamps',
                    run() {
                        const summary = helper.summarizeJournal({
                            id: 'journal-one',
                            name: 'Hybrid Run',
                            createdAt: '2026-04-01T08:00:00.000Z',
                            updatedAt: '2026-04-13T08:00:00.000Z',
                            quests: [
                                { title: 'Unbound', category: 'Main Quest', status: 'Completed' },
                                { title: 'Dragon Rising', category: 'Main Quest', status: 'Active' },
                                { title: 'Take Up Arms', category: 'Faction', status: 'Not Started' }
                            ]
                        });

                        assert(summary.total === 3, 'Expected total quest count to be reported.');
                        assert(summary.completed === 1, 'Expected completed count to be reported.');
                        assert(summary.active === 1, 'Expected active count to be reported.');
                        assert(summary.notStarted === 1, 'Expected not-started count to be reported.');
                        assert(summary.updatedAt === '2026-04-13T08:00:00.000Z', 'Expected summary to preserve updatedAt.');
                    }
                },
                {
                    name: 'renderJournalDetailsList renders one card per journal',
                    run() {
                        const container = document.createElement('ul');

                        const rendered = helper.renderJournalDetailsList(container, [
                            {
                                id: 'journal-one',
                                name: 'Warrior',
                                updatedAt: '2026-04-13T08:00:00.000Z',
                                quests: [
                                    { title: 'Unbound', category: 'Main Quest', status: 'Completed' },
                                    { title: 'Dragon Rising', category: 'Main Quest', status: 'Active' }
                                ]
                            },
                            {
                                id: 'journal-two',
                                name: 'Mage',
                                updatedAt: '2026-04-14T08:00:00.000Z',
                                quests: [
                                    { title: 'First Lessons', category: 'Faction', status: 'Active' }
                                ]
                            }
                        ], 'journal-two', {
                            formatTimestamp: (value) => `formatted:${value}`
                        });

                        assert(rendered.length === 2, 'Expected a view model entry for each journal.');
                        assert(container.children.length === 2, 'Expected one rendered card per journal.');
                        assert(container.children[0].querySelector('h4').textContent === 'Warrior', 'Expected first journal title to render.');
                        assert(container.children[1].querySelector('.journal-detail-updated').textContent.includes('formatted:2026-04-14T08:00:00.000Z'), 'Expected custom timestamp formatting to be used in rendering.');
                    }
                },
                {
                    name: 'renderJournalDetailsList applies active journal highlight class',
                    run() {
                        const container = document.createElement('ul');

                        helper.renderJournalDetailsList(container, [
                            {
                                id: 'journal-one',
                                name: 'Warrior',
                                updatedAt: '2026-04-13T08:00:00.000Z',
                                quests: [{ title: 'Unbound', category: 'Main Quest', status: 'Completed' }]
                            },
                            {
                                id: 'journal-two',
                                name: 'Mage',
                                updatedAt: '2026-04-14T08:00:00.000Z',
                                quests: [{ title: 'First Lessons', category: 'Faction', status: 'Active' }]
                            }
                        ], 'journal-two');

                        assert(!container.children[0].classList.contains('active'), 'Expected non-active journal cards to omit the active class.');
                        assert(container.children[1].classList.contains('active'), 'Expected the selected journal card to receive the active class.');
                        assert(container.children[1].querySelector('.journal-detail-meta').textContent === 'Currently selected playthrough', 'Expected the active journal label to render.');
                    }
                },
                {
                    name: 'renderQuestCard includes taxonomy, meta, and actions for active quests',
                    run() {
                        const card = helper.renderQuestCard(document, {
                            id: 'quest-one',
                            title: 'The Black Star',
                            category: 'Daedric',
                            status: 'Active',
                            location: 'Winterhold',
                            notes: 'Choose who to trust.',
                            branchGroup: 'Azura Artifact Choice',
                            branch: 'Choice Driven',
                            prerequisites: ['Find Nelacar']
                        });

                        assert(card.classList.contains('quest-card'), 'Expected the root quest card class.');
                        assert(card.querySelector('.quest-title').textContent === 'The Black Star', 'Expected quest title to render.');
                        assert(card.querySelector('.quest-status').textContent === 'Active', 'Expected quest status to render.');
                        assert(card.querySelector('.quest-taxonomy') !== null, 'Expected taxonomy block to render for branched quests.');
                        assert(card.querySelector('.quest-tag.tag-branch-group').textContent.includes('Azura Artifact Choice'), 'Expected branch-group tag to render.');
                        assert(card.querySelector('.quest-prerequisites').textContent.includes('Find Nelacar'), 'Expected prerequisites text to render.');
                        assert(card.querySelectorAll('.action-btn').length === 3, 'Expected edit, complete, and delete actions for incomplete quests.');
                    }
                },
                {
                    name: 'renderQuestCard omits complete button for completed quests',
                    run() {
                        const card = helper.renderQuestCard(document, {
                            id: 'quest-two',
                            title: 'Unbound',
                            category: 'Main Quest',
                            status: 'Completed',
                            notes: ''
                        });

                        assert(card.querySelector('.quest-notes p').textContent === 'No journal entries.', 'Expected empty notes to use the fallback text.');
                        assert(card.querySelectorAll('.action-btn').length === 2, 'Expected only edit and delete actions for completed quests.');
                        assert(card.querySelector('.complete-btn') === null, 'Expected no complete action for completed quests.');
                        assert(card.querySelector('.quest-meta').textContent.includes('Unknown'), 'Expected missing location to fall back to Unknown.');
                    }
                }
            ];

            const results = tests.map(test => {
                try {
                    test.run();
                    return { name: test.name, status: 'pass' };
                } catch (error) {
                    return { name: test.name, status: 'fail', details: formatError(error) };
                }
            });

            const failed = results.filter(result => result.status === 'fail');
            summaryEl.className = `summary ${failed.length === 0 ? 'pass' : 'fail'}`;
            summaryEl.textContent = failed.length === 0
                ? `All ${results.length} tests passed.`
                : `${failed.length} of ${results.length} tests failed.`;

            resultsEl.innerHTML = '';
            results.forEach(result => {
                const article = document.createElement('article');
                article.className = `result ${result.status}`;

                const heading = document.createElement('h2');
                heading.textContent = `${result.status === 'pass' ? 'PASS' : 'FAIL'}: ${result.name}`;
                article.appendChild(heading);

                if (result.details) {
                    const details = document.createElement('pre');
                    details.textContent = result.details;
                    article.appendChild(details);
                }

                resultsEl.appendChild(article);
            });

            timestampEl.textContent = `Last run: ${new Date().toLocaleTimeString()}`;
        }

        rerunButton.addEventListener('click', runTests);
        runTests();
    </script>
</body>
</html>
